<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Insights | PayNearBy</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
</head>
<body class="home-page">
  <div class="noise-overlay"></div>
  <div class="home-container analytics-container">
    <div class="top-bar">
      <div class="logo-block">
        <div class="logo-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="24" fill="var(--accent)"/>
            <path d="M16 24 C16 19.6 19.6 16 24 16 C28.4 16 32 19.6 32 24" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M12 24 C12 17.4 17.4 12 24 12 C30.6 12 36 17.4 36 24" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
            <circle cx="24" cy="24" r="3.5" fill="white"/>
            <path d="M21 30 L24 24 L29 33" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <div>
          <h1 class="logo-title">PayNearBy</h1>
          <p class="logo-sub">Offline UPI</p>
        </div>
      </div>
      <a href="index.html" class="ghost-btn" style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center;">Back</a>
    </div>

    <section class="insights-grid">
      <div class="insight-card stat-card">
        <span class="insight-label">Total volume</span>
        <strong id="totalVolume">Rs 0</strong>
        <p id="successRateCopy">0% successful so far</p>
      </div>
      <div class="insight-card stat-card">
        <span class="insight-label">Average ticket</span>
        <strong id="avgTicket">Rs 0</strong>
        <p id="riskLevelCopy">Risk level: Normal</p>
      </div>
      <div class="insight-card highlight-card">
        <span class="insight-label">AI insights</span>
        <div id="highlightList" class="highlight-list"></div>
      </div>
    </section>

    <section class="chart-section">
      <div class="section-head">
        <h3>AI Insights</h3>
        <span>Charts built from your stored transactions</span>
      </div>

      <div class="chart-card">
        <div class="chart-head">
          <strong>Volume trend</strong>
          <span>Recent transaction amounts</span>
        </div>
        <div id="trendChart" class="bar-chart"></div>
      </div>

      <div class="chart-card">
        <div class="chart-head">
          <strong>Status mix</strong>
          <span>Success vs pending vs failed</span>
        </div>
        <div class="donut-chart-wrap">
          <div class="donut-shell">
            <div id="statusDonut" class="donut-chart"></div>
            <div class="donut-center">
              <strong id="statusTotal">0</strong>
              <span>transactions</span>
            </div>
          </div>
          <div id="statusLegend" class="chart-legend"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="assets/app.js"></script>
  <script>
    requireLogin();
    const USER_ID = getCurrentUserId();

    function renderHighlights(items) {
      const list = document.getElementById("highlightList");
      list.innerHTML = items.map(item => `<p>${item}</p>`).join("");
    }

    function renderTrendChart(points) {
      const chart = document.getElementById("trendChart");
      if (!points.length) {
        chart.innerHTML = "<p class='empty-state'>No transaction data yet.</p>";
        return;
      }

      const max = Math.max(...points.map(point => point.amount), 1);
      chart.innerHTML = points.map(point => `
        <div class="bar-item">
          <div class="bar-track">
            <div class="bar-fill" style="height:${Math.max((point.amount / max) * 100, 8)}%"></div>
          </div>
          <strong>${formatINR(point.amount)}</strong>
          <span>${point.label}</span>
        </div>
      `).join("");
    }

    function renderStatusChart(items) {
      const total = items.reduce((sum, item) => sum + item.count, 0);
      const colors = {
        success: "#00d4aa",
        processing: "#6c63ff",
        pending: "#ffb347",
        scanned: "#4cc9f0",
        failed: "#ff4757",
        expired: "#8888aa"
      };

      document.getElementById("statusTotal").textContent = total;

      if (!total) {
        document.getElementById("statusDonut").style.background = "rgba(255,255,255,0.08)";
        document.getElementById("statusLegend").innerHTML = "<p class='empty-state'>No transactions to analyze yet.</p>";
        return;
      }

      let start = 0;
      const gradients = items.filter(item => item.count > 0).map(item => {
        const slice = (item.count / total) * 360;
        const end = start + slice;
        const color = colors[item.status] || "#8888aa";
        const segment = `${color} ${start}deg ${end}deg`;
        start = end;
        return segment;
      }).join(", ");

      document.getElementById("statusDonut").style.background = `conic-gradient(${gradients})`;
      document.getElementById("statusLegend").innerHTML = items.filter(item => item.count > 0).map(item => `
        <div class="legend-item">
          <span class="legend-dot" style="background:${colors[item.status] || "#8888aa"}"></span>
          <strong>${item.status}</strong>
          <span>${item.count}</span>
        </div>
      `).join("");
    }

    async function loadInsights() {
      const res = await fetch(`/api/payment/insights/summary?userId=${USER_ID}`);
      const data = await res.json();

      document.getElementById("totalVolume").textContent = formatINR(data.summary.totalVolume || 0);
      document.getElementById("avgTicket").textContent = formatINR(data.summary.avgTicket || 0);
      document.getElementById("successRateCopy").textContent = `${data.summary.successRate || 0}% successful so far`;
      document.getElementById("riskLevelCopy").textContent = `Risk level: ${data.summary.riskLevel}`;

      renderHighlights(data.highlights || []);
      renderTrendChart((data.volumeTrend || []).slice(-6));
      renderStatusChart(data.statusBreakdown || []);
    }

    loadInsights();
  </script>
</body>
</html>
