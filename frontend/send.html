<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Send Payment · PayNearby</title>
  <link rel="stylesheet" href="assets/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    .wallet-box {
      border: 1px solid rgba(108,99,255,0.3);
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.02);
    }
    .wallet-header {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      margin-bottom: 10px;
    }
    .wallet-actions {
      display: flex;
      gap: 10px;
    }
    .wallet-actions input {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #444;
    }
    .wallet-actions button {
      background: #6c63ff;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body class="send-page">
  <div class="noise-overlay"></div>
  <div class="page-container">

    <div class="page-header">
      <a href="index.html" class="back-btn">← Back</a>
      <h2>Send via QR + Bluetooth</h2>
    </div>

    <!-- STEP 1 -->
    <div id="step1" class="step-card active">

      <!-- 💰 WALLET -->
      <div class="wallet-box">
        <div class="wallet-header">
          <span>💰 Wallet Balance</span>
          <strong>₹<span id="walletBalance">0</span></strong>
        </div>
        <div class="wallet-actions">
          <input type="number" id="addAmount" placeholder="Add money (₹)" />
          <button onclick="addMoney()">Add</button>
        </div>
      </div>

      <div class="step-label">Step 1 of 3 · Your Details</div>
      <h3>Enter Payment Info</h3>

      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="senderName" placeholder="e.g. Rahul Sharma"/>
      </div>

      <div class="form-group">
        <label>Your UPI ID</label>
        <input type="text" id="senderUpi" placeholder="e.g. rahul@upi"/>
      </div>

      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="e.g. 250" min="1"/>
      </div>

      <button class="btn-primary" onclick="createPayment()">
        <span>Generate Secure QR Code</span>
        <span class="btn-icon">🔐</span>
      </button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step-card">
      <h3>Show QR</h3>
      <img id="qrCode"/>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="step-card">
      <h3>Confirm</h3>
      <p id="receiverName"></p>
      <p id="receiverUpi"></p>
      <p id="confirmAmount"></p>

      <button onclick="confirmPayment()">Confirm & Pay</button>
    </div>

    <!-- STEP 4 -->
    <div id="step4" class="step-card">
      <h3 id="resultTitle">Processing...</h3>
      <p id="resultMsg"></p>
    </div>

  </div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

// ✅ REAL USER (from login)
const USER_ID = localStorage.getItem("userId");

if(!USER_ID){
  alert("Please login first");
  window.location.href = "login.html";
}

let currentTxnId = null;

// 💰 LOAD WALLET
async function loadWallet(){
  try{
    const res = await fetch(`/api/wallet/${USER_ID}`);
    const data = await res.json();

    if(data.error){
      console.log(data.error);
      return;
    }

    document.getElementById("walletBalance").innerText = data.balance || 0;
  }catch{
    console.log("wallet error");
  }
}

// ➕ ADD MONEY
async function addMoney(){
  const amount = document.getElementById("addAmount").value;

  if(!amount) return alert("Enter amount");

  const res = await fetch("/api/wallet/add-money",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({
      userId: USER_ID,
      amount: Number(amount)
    })
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
    return;
  }

  alert("Money added!");
  document.getElementById("addAmount").value="";
  loadWallet();
}

// CREATE PAYMENT
async function createPayment(){
  const name = document.getElementById("senderName").value;
  const upiId = document.getElementById("senderUpi").value;
  const amount = document.getElementById("amount").value;

  if(!name || !upiId || !amount){
    return alert("Fill all details");
  }

  const res = await fetch("/api/payment/create",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({ name, upiId, amount })
  });

  const data = await res.json();

  currentTxnId = data.txnId;

  document.getElementById("qrCode").src = data.qrDataUrl;

  showStep(2);

  socket.emit("bt:advertise", data);
}

// STEP SWITCH
function showStep(n){
  document.querySelectorAll(".step-card").forEach(c=>c.style.display="none");
  document.getElementById("step"+n).style.display="block";
}

// RECEIVER CONNECT
socket.on("bt:receiver:connected",(data)=>{
  document.getElementById("receiverName").innerText = data.receiverName;
  document.getElementById("receiverUpi").innerText = data.receiverUpi;
  document.getElementById("confirmAmount").innerText = "₹"+document.getElementById("amount").value;

  showStep(3);
});

// CONFIRM PAYMENT
function confirmPayment(){
  showStep(4);

  socket.emit("bt:pay:initiate",{ txnId: currentTxnId });
}

// RESULT
socket.on("bt:pay:result",(data)=>{
  if(data.status==="success"){
    document.getElementById("resultTitle").innerText="Payment Success";
    document.getElementById("resultMsg").innerText="₹"+data.txn.amount+" sent";
  }else{
    document.getElementById("resultTitle").innerText="Failed";
    document.getElementById("resultMsg").innerText=data.error || "Try again";
  }

  loadWallet(); // 🔥 update balance
});

// INIT
loadWallet();
</script>

</body>
</html>
