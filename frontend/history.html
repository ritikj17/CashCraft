<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transaction History | PayNearBy</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
</head>
<body class="home-page">
  <div class="noise-overlay"></div>
  <div class="home-container history-container">
    <div class="top-bar">
      <div class="logo-block">
        <div class="logo-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="24" fill="var(--accent)"/>
            <path d="M16 24 C16 19.6 19.6 16 24 16 C28.4 16 32 19.6 32 24" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M12 24 C12 17.4 17.4 12 24 12 C30.6 12 36 17.4 36 24" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
            <circle cx="24" cy="24" r="3.5" fill="white"/>
            <path d="M21 30 L24 24 L29 33" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <div>
          <h1 class="logo-title">PayNearBy</h1>
          <p class="logo-sub">Offline UPI</p>
        </div>
      </div>
      <a href="index.html" class="ghost-btn" style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center;">Back</a>
    </div>

    <div class="history-section" style="display:block;">
      <h3>Recent Transactions</h3>
      <div id="historyList"></div>
    </div>
  </div>

  <script src="assets/app.js"></script>
  <script>
    requireLogin();
    const USER_ID = getCurrentUserId();

    function describeTransaction(txn) {
      const isSender = String(txn.senderUserId || "") === String(USER_ID);
      const counterparty = isSender ? (txn.receiverName || "Unknown receiver") : (txn.senderName || "Unknown sender");
      const direction = isSender ? "Sent to" : "Received from";
      return `${direction} ${counterparty}`;
    }

    async function loadHistory() {
      const res = await fetch(`/api/payment/history?userId=${USER_ID}`);
      const txns = await res.json();
      const list = document.getElementById("historyList");

      if (!txns.length) {
        list.innerHTML = "<p class='empty-state'>No transactions yet.</p>";
        return;
      }

      list.innerHTML = txns.map(t => `
        <div class="txn-row ${t.status}">
          <div>
            <strong>${formatINR(t.amount)}</strong>
            <span>${describeTransaction(t)}</span>
          </div>
          <div class="txn-meta">
            <span class="badge ${t.status}">${t.status}</span>
            <span>${new Date(t.timestamp).toLocaleString()}</span>
          </div>
        </div>
      `).join("");
    }

    loadHistory();
  </script>
</body>
</html>
